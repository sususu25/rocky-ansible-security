# playbooks/roles/security_script/tasks/main.yml

- name: Precheck | sudo works non-interactively
  become: yes
  command: sudo -n true
  changed_when: false

- name: Set log path facts
  set_fact:
    run_ts: "{{ lookup('pipe','date +%Y%m%d_%H%M%S') }}"
    remote_log_dir: "/opt/security/logs/{{ inventory_hostname }}"
    remote_raw_log: "/opt/security/logs/{{ inventory_hostname }}/{{ inventory_hostname }}_{{ lookup('pipe','date +%Y%m%d_%H%M%S') }}_raw.log"
    remote_latest_summary_log: "/opt/security/logs/{{ inventory_hostname }}/{{ inventory_hostname }}_last_summary.log"
    local_logs_dir: "{{ (playbook_dir | dirname) }}/logs"

- name: Ensure remote and local log directories exist
  become: yes
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/security/fixes
    - "{{ remote_log_dir }}"

- name: Ensure local logs directory exists
  delegate_to: localhost
  become: false
  file:
    path: "{{ local_logs_dir }}"
    state: directory
    mode: "0755"

- name: Copy fixes directory
  become: yes
  copy:
    src: fixes/
    dest: /opt/security/fixes/
    mode: "0755"

- name: Init remote raw log header
  become: yes
  shell: |
    {
      echo "[{{ lookup('pipe','date -u +%Y-%m-%dT%H:%M:%SZ') }}] ===== Ansible security run start ====="
      echo "Host={{ inventory_hostname }}"
      echo "RunMode={{ run_mode | default('fix') }}"
      echo ""
    } > "{{ remote_raw_log }}"
  args:
    executable: /bin/bash
  changed_when: false

- name: Find fix scripts (U-*.sh)
  become: yes
  find:
    paths: /opt/security/fixes
    patterns: "U-*.sh"
    file_type: file
  register: fix_scripts

- name: Build sorted fix list
  set_fact:
    fix_list: "{{ fix_scripts.files | map(attribute='path') | sort }}"

- name: Init result containers
  set_fact:
    ok_list: []
    manual_list: []
    fail_list: []
    manual_blocks: []

- name: Run each fix script sequentially (do not stop on failure)
  become: yes
  shell: |
    set -o pipefail
    script="{{ item }}"
    base="$(basename "{{ item }}")"

    echo "▶ [{{ inventory_hostname }}] START ${base}" >> "{{ remote_raw_log }}"
    bash "${script}" >> "{{ remote_raw_log }}" 2>&1
    rc=$?

    if [ "$rc" -eq 0 ]; then
      echo "✅ [{{ inventory_hostname }}] OK   ${base} (rc=${rc})" >> "{{ remote_raw_log }}"
    elif [ "$rc" -eq 2 ]; then
      echo "⚠️ [{{ inventory_hostname }}] MANUAL ${base} (rc=${rc})" >> "{{ remote_raw_log }}"
    else
      echo "❌ [{{ inventory_hostname }}] FAIL ${base} (rc=${rc})" >> "{{ remote_raw_log }}"
    fi

    echo "■ [{{ inventory_hostname }}] END ${base} rc=${rc}" >> "{{ remote_raw_log }}"
    echo "" >> "{{ remote_raw_log }}"
    exit $rc
  args:
    executable: /bin/bash
  loop: "{{ fix_list }}"
  loop_control:
    label: "{{ item | basename }}"
  register: run_results
  ignore_errors: true
  failed_when: false

- name: Classify results (OK)
  set_fact:
    ok_list: "{{ ok_list + [item.item | basename] }}"
  loop: "{{ run_results.results }}"
  when: (item.rc | default(1)) == 0

- name: Classify results (MANUAL)
  set_fact:
    manual_list: "{{ manual_list + [item.item | basename] }}"
  loop: "{{ run_results.results }}"
  when: (item.rc | default(1)) == 2

- name: Classify results (FAIL)
  set_fact:
    fail_list: "{{ fail_list + [item.item | basename] }}"
  loop: "{{ run_results.results }}"
  when: (item.rc | default(1)) not in [0, 2]

- name: Build MANUAL ACTION blocks
  set_fact:
    manual_blocks: "{{ manual_blocks + [ block ] }}"
  vars:
    fname: "{{ item }}"
    guide: "{{ manual_guides.get(fname, {}) }}"
    block: |
      ──────────────────────────────────────────────
      [MANUAL ACTION] {{ fname }}
      - title: {{ guide.title | default('manual item') }}
      - why:   {{ guide.why   | default('requires operator decision/approval') }}
      - next:
      {% for n in (guide.next | default([])) %}
        - {{ n }}
      {% endfor %}
      - evidence(cmd):
      {% for e in (guide.evidence | default([])) %}
        - {{ e }}
      {% endfor %}
      ──────────────────────────────────────────────
  loop: "{{ manual_list }}"
  loop_control:
    label: "{{ item }}"

- name: Append MANUAL ACTION blocks to remote raw log
  become: yes
  shell: |
    cat >> "{{ remote_raw_log }}" <<'EOF'
    {% for b in manual_blocks %}
    {{ b }}

    {% endfor %}
    EOF
  args:
    executable: /bin/bash
  when: manual_blocks | length > 0
  changed_when: false

- name: Compute result counts
  set_fact:
    total_count: "{{ fix_list | length }}"
    ok_count: "{{ ok_list | length }}"
    manual_count: "{{ manual_list | length }}"
    fail_count: "{{ fail_list | length }}"

- name: Build summary text
  set_fact:
    summary_text: |
      [SUMMARY] Host={{ inventory_hostname }}
      - run_mode: {{ run_mode | default('fix') }}
      - executed_at: {{ run_ts }}
      - total: {{ total_count }}
      - ok(✅): {{ ok_count }}
      - manual(⚠️): {{ manual_count }}
      - fail(❌): {{ fail_count }}
      - remote_raw_log: {{ remote_raw_log }}
      - remote_latest_summary: {{ remote_latest_summary_log }}

      [MANUAL LIST]
      {% if manual_list | length > 0 %}
      {% for item in manual_list %}
      - {{ item }}
      {% endfor %}
      {% else %}
      - none
      {% endif %}

      [FAIL LIST]
      {% if fail_list | length > 0 %}
      {% for item in fail_list %}
      - {{ item }}
      {% endfor %}
      {% else %}
      - none
      {% endif %}

- name: Write latest summary on remote host
  become: yes
  copy:
    content: "{{ summary_text }}"
    dest: "{{ remote_latest_summary_log }}"
    mode: "0644"

- name: Write local summary log for Jenkins artifact
  delegate_to: localhost
  become: false
  copy:
    content: "{{ summary_text }}"
    dest: "{{ local_logs_dir }}/{{ inventory_hostname }}_{{ run_ts }}_summary.log"
    mode: "0644"

- name: Read remote raw log
  become: yes
  slurp:
    src: "{{ remote_raw_log }}"
  register: remote_raw_log_content

- name: Write local raw log for Jenkins artifact
  delegate_to: localhost
  become: false
  copy:
    content: "{{ remote_raw_log_content.content | b64decode }}"
    dest: "{{ local_logs_dir }}/{{ inventory_hostname }}_{{ run_ts }}_raw.log"
    mode: "0644"

- name: Print final summary
  debug:
    msg: "{{ summary_text.split('\n') }}"

- name: Fail play at end when failures exist
  fail:
    msg: "Security run has FAIL items: {{ fail_list }}"
  when: fail_count | int > 0